name: Build & Release Linux App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-linux-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Linux packages (.deb & AppImage)
        run: ./gradlew :desktopApp:packageDeb :desktopApp:packageAppImage

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release-artifacts
          find desktopApp/build/compose/binaries/main/deb/ -name "*.deb" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find desktopApp/build/compose/binaries/main/appimage/ -name "*" -type f -exec cp {} release-artifacts/ \; 2>/dev/null || true
          ls -la release-artifacts/

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
